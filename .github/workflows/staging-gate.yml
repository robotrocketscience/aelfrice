name: Staging Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  pattern-scan:
    # Skip on dependabot PRs: GitHub does not pass repository Actions secrets
    # to dependabot-triggered runs (supply-chain protection), so SCAN_RULES_B64
    # is empty and this job has no patterns to scan against. Dependabot diffs
    # only touch dependency manifests (pyproject.toml / uv.lock), which carry
    # no PII vector worth gating on. Other staging-gate jobs (secrets-scan,
    # history-scan, commit-msg-prefix, pr-body-issue-link) still run and
    # provide the actual security gates for dep updates.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - name: Decode patterns
        env:
          PATTERNS: ${{ secrets.SCAN_RULES_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${PATTERNS:-}" ]; then
            echo "::error::SCAN_RULES_B64 not configured"
            exit 1
          fi
          echo "$PATTERNS" | base64 -d > /tmp/p
          [ -s /tmp/p ] || { echo "::error::empty"; exit 1; }
      - name: Scan tracked files
        run: |
          set -euo pipefail
          mapfile -t EXEMPT < <(grep -vE '^(#|$)' .github-pii-exempt 2>/dev/null || true)
          mapfile -t FILES < <(git ls-files | while read -r f; do
            skip=0
            for pat in "${EXEMPT[@]:-}"; do
              [ -z "$pat" ] && continue
              [[ "$f" == $pat ]] && { skip=1; break; }
            done
            [ "$skip" -eq 0 ] && echo "$f"
          done)
          fail=0
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            [[ "$p" =~ ^# ]] && continue
            if matches=$(grep -EHnI "$p" "${FILES[@]}" 2>/dev/null); then
              echo "::error::pattern hit"
              echo "$matches"
              fail=1
            fi
          done < /tmp/p
          rm -f /tmp/p
          exit "$fail"

  history-scan:
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base ref
        run: |
          git fetch --no-tags origin "$BASE_REF"
      - name: Decode patterns
        env:
          PATTERNS: ${{ secrets.SCAN_RULES_B64 }}
        run: |
          set -euo pipefail
          echo "$PATTERNS" | base64 -d > /tmp/p
      - name: Scan PR-incoming history
        run: |
          set -euo pipefail
          # Discretion is a property of incoming changes, not of code that
          # already shipped to main. Scope the scan to commits this PR adds
          # on top of the merge base, so a legitimate identifier merged via
          # an earlier PR cannot retroactively block every subsequent PR.
          merge_base="$(git merge-base "origin/${BASE_REF}" "$HEAD_SHA")"
          range="${merge_base}..${HEAD_SHA}"
          git log "$range" --format='%H%n%an%n%ae%n%cn%n%ce%n%s%n%b' > /tmp/h
          git log "$range" -p > /tmp/d
          fail=0
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            [[ "$p" =~ ^# ]] && continue
            if grep -El "$p" /tmp/h /tmp/d >/dev/null; then
              echo "::error::pattern hit in history"
              fail=1
            fi
          done < /tmp/p
          rm -f /tmp/p /tmp/h /tmp/d
          exit "$fail"

  release-docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect release PR and verify docs
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          extract_version() {
            grep -m1 -E '^version[[:space:]]*=' "$1" | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/'
          }
          head_ver="$(extract_version pyproject.toml)"
          git fetch --no-tags origin "$BASE_REF" --depth=1
          git show "origin/${BASE_REF}:pyproject.toml" > /tmp/base_pyproject.toml
          base_ver="$(extract_version /tmp/base_pyproject.toml)"
          if [ "$head_ver" = "$base_ver" ]; then
            echo "Not a release PR (version unchanged: ${head_ver}). Skipping docs check."
            exit 0
          fi
          echo "Release PR detected: ${base_ver} -> ${head_ver}"
          fail=0
          if ! grep -qE "^## \[${head_ver}\]" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::Missing '## [${head_ver}]' section. Move [Unreleased] entries into a dated [${head_ver}] block."
            fail=1
          fi
          if ! grep -qE "^\[${head_ver}\]:\s*https://github.com/" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::Missing compare-link footnote '[${head_ver}]: https://github.com/...' near bottom of file."
            fail=1
          fi
          if grep -qE "v?${head_ver}\s*\|\s*(next|planned)\b" README.md; then
            echo "::error file=README.md::Roadmap row for v${head_ver} still says 'next' or 'planned'. Flip status to 'shipped' before cutting the release."
            fail=1
          fi
          if [ -f docs/ROADMAP.md ] && ! grep -qE "v${head_ver}" docs/ROADMAP.md; then
            echo "::warning file=docs/ROADMAP.md::No mention of v${head_ver}. Consider adding a section (non-blocking)."
          fi
          exit "$fail"

  # ---------------------------------------------------------------------------
  # #169 — Conventional-commit prefix enforcement
  #
  # Validates that every commit in the PR (base..head) starts with an allowed
  # conventional-commit prefix.  The check is delegated entirely to
  # scripts/check-commit-msg.py so the prefix list stays in one place.
  #
  # Exempt subjects (handled inside the script):
  #   - "Merge ..."  — git-generated merge commits
  #   - "Revert ..." — git-generated revert commits
  #
  # This job fails the PR if any commit has an invalid prefix.
  # ---------------------------------------------------------------------------
  commit-msg-prefix:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit-message prefixes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r sha; do
            subject="$(git log -1 --format='%s' "$sha")"
            if ! python3 scripts/check-commit-msg.py --subject "$subject"; then
              echo "::error::Bad commit prefix in $sha: $subject"
              fail=1
            fi
          done < <(git log --format='%H' "${BASE_SHA}..${HEAD_SHA}")
          if [ "$fail" -eq 0 ]; then
            echo "All commit subjects have valid conventional-commit prefixes."
          fi
          exit "$fail"

  # ---------------------------------------------------------------------------
  # #413 — PR-title conventional-commit prefix enforcement
  #
  # Mirrors `commit-msg-prefix` (which validates each commit subject) but
  # checks the PR title.  PR titles drive several downstream behaviors:
  # CodeRabbit's `ignore_title_keywords: ["docs:", "release:"]` filter, the
  # release-drafter category mapping, and the squash-merge subject when one
  # is used.  A missing prefix silently disables those filters; this job
  # surfaces the mistake before CI burns time on a docs-only PR running
  # full pytest.
  #
  # The prefix list is delegated to scripts/check-commit-msg.py so it stays
  # in sync with `commit-msg-prefix` and CLAUDE.md.
  # ---------------------------------------------------------------------------
  pr-title-prefix:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Validate PR title prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          if ! python3 scripts/check-commit-msg.py --subject "$PR_TITLE"; then
            echo "::error::PR title must start with a conventional-commit prefix (feat:, fix:, docs:, etc.). See CLAUDE.md or scripts/check-commit-msg.py for the allowed list. Current title: $PR_TITLE"
            exit 1
          fi
          echo "PR title has a valid conventional-commit prefix."

  # ---------------------------------------------------------------------------
  # #170 — PR-body issue-link warning (non-blocking)
  #
  # Inspects the PR body for a GitHub auto-close keyword followed by an issue
  # reference.  Recognised patterns (case-insensitive):
  #
  #   close[sd]? #N        closes #N, close #N, closed #N
  #   fix(e[sd])? #N       fixes #N, fix #N, fixed #N
  #   resolve[sd]? #N      resolves #N, resolve #N, resolved #N
  #   … same with "GH-N" instead of "#N"
  #
  # PRs that legitimately have no issue (release PRs, dependency bumps, etc.)
  # can silence the warning by including the marker <!-- no-issue --> anywhere
  # in the PR body.
  #
  # CONTRACT: this job always exits 0.  It is informational only and must
  # never block a merge.  The ::warning:: annotation appears in the CI log
  # and as a check-run summary.  See CONTRIBUTING.md § PR body requirements.
  # ---------------------------------------------------------------------------
  pr-body-issue-link:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - name: Check PR body for issue link
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          # Regex: optional leading whitespace, keyword, optional space,
          # then "#N" or "GH-N" (N = one or more digits).
          LINK_PATTERN='(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+(#|GH-)[0-9]+'
          OPTOUT_MARKER='<!-- no-issue -->'
          body="${PR_BODY:-}"
          if echo "$body" | grep -qiE "$LINK_PATTERN"; then
            echo "::notice::PR body contains an issue-close link. Traceability OK."
            exit 0
          fi
          if echo "$body" | grep -qF "$OPTOUT_MARKER"; then
            echo "::notice::PR body contains <!-- no-issue --> opt-out marker. Skipping link check."
            exit 0
          fi
          echo "::warning::PR body has no Closes/Fixes/Resolves issue link and no <!-- no-issue --> opt-out marker. Consider adding 'Closes #N' so GitHub links the issue automatically. If this PR has no associated issue, add <!-- no-issue --> to silence this warning."
          # Always exit 0 — this check is advisory, not a gate.
          exit 0
