name: Staging Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  pattern-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode patterns
        env:
          PATTERNS: ${{ secrets.SCAN_RULES_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${PATTERNS:-}" ]; then
            echo "::error::SCAN_RULES_B64 not configured"
            exit 1
          fi
          echo "$PATTERNS" | base64 -d > /tmp/p
          [ -s /tmp/p ] || { echo "::error::empty"; exit 1; }
      - name: Scan tracked files
        run: |
          set -euo pipefail
          mapfile -t EXEMPT < <(grep -vE '^(#|$)' .github-pii-exempt 2>/dev/null || true)
          mapfile -t FILES < <(git ls-files | while read -r f; do
            skip=0
            for pat in "${EXEMPT[@]:-}"; do
              [ -z "$pat" ] && continue
              [[ "$f" == $pat ]] && { skip=1; break; }
            done
            [ "$skip" -eq 0 ] && echo "$f"
          done)
          fail=0
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            [[ "$p" =~ ^# ]] && continue
            if matches=$(grep -EHnI "$p" "${FILES[@]}" 2>/dev/null); then
              echo "::error::pattern hit"
              echo "$matches"
              fail=1
            fi
          done < /tmp/p
          rm -f /tmp/p
          exit "$fail"

  history-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch all branches
        run: |
          git fetch --no-tags --prune origin '+refs/heads/*:refs/remotes/origin/*'
      - name: Decode patterns
        env:
          PATTERNS: ${{ secrets.SCAN_RULES_B64 }}
        run: |
          set -euo pipefail
          echo "$PATTERNS" | base64 -d > /tmp/p
      - name: Scan history
        run: |
          set -euo pipefail
          git log --all --remotes='origin/*' --format='%H%n%an%n%ae%n%cn%n%ce%n%s%n%b' > /tmp/h
          git log --all --remotes='origin/*' -p > /tmp/d
          fail=0
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            [[ "$p" =~ ^# ]] && continue
            if grep -El "$p" /tmp/h /tmp/d >/dev/null; then
              echo "::error::pattern hit in history"
              fail=1
            fi
          done < /tmp/p
          rm -f /tmp/p /tmp/h /tmp/d
          exit "$fail"

  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen --extra dev --extra archive
      - run: uv run pytest tests/ -q

  release-docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect release PR and verify docs
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          extract_version() {
            grep -m1 -E '^version[[:space:]]*=' "$1" | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/'
          }
          head_ver="$(extract_version pyproject.toml)"
          git fetch --no-tags origin "$BASE_REF" --depth=1
          git show "origin/${BASE_REF}:pyproject.toml" > /tmp/base_pyproject.toml
          base_ver="$(extract_version /tmp/base_pyproject.toml)"
          if [ "$head_ver" = "$base_ver" ]; then
            echo "Not a release PR (version unchanged: ${head_ver}). Skipping docs check."
            exit 0
          fi
          echo "Release PR detected: ${base_ver} -> ${head_ver}"
          fail=0
          if ! grep -qE "^## \[${head_ver}\]" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::Missing '## [${head_ver}]' section. Move [Unreleased] entries into a dated [${head_ver}] block."
            fail=1
          fi
          if ! grep -qE "^\[${head_ver}\]:\s*https://github.com/" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::Missing compare-link footnote '[${head_ver}]: https://github.com/...' near bottom of file."
            fail=1
          fi
          if grep -qE "v?${head_ver}\s*\|\s*(next|planned)\b" README.md; then
            echo "::error file=README.md::Roadmap row for v${head_ver} still says 'next' or 'planned'. Flip status to 'shipped' before cutting the release."
            fail=1
          fi
          if [ -f docs/ROADMAP.md ] && ! grep -qE "v${head_ver}" docs/ROADMAP.md; then
            echo "::warning file=docs/ROADMAP.md::No mention of v${head_ver}. Consider adding a section (non-blocking)."
          fi
          exit "$fail"
