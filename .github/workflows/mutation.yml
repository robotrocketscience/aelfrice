name: mutation

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutmut:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen --extra dev --extra archive
      - name: Install mutmut
        run: uv pip install mutmut
      - name: Run mutation tests
        id: mutmut
        run: |
          uv run mutmut run --paths-to-mutate=src/aelfrice --tests-dir=tests || true
          uv run mutmut results > mutation-report.txt
          cat mutation-report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutation-report.txt
          retention-days: 30
