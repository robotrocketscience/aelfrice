name: E2E

# End-to-end suite (#334). Triggers:
#  - PR opt-in via the `e2e` label (label / synchronize / reopened).
#  - push to main (post-merge regression catch).
# Failure surfacing (#370):
#  - push:main fail → open issue tagged `attn:e2e-failure` referencing the SHA.
#  - PR fail → add `attn:e2e-failure` label to the PR.

on:
  pull_request:
    types: [labeled, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        install-method: [uv-tool, pipx, venv-pip]
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install pipx
        if: matrix.install-method == 'pipx'
        run: python -m pip install --user pipx
      - name: Install via ${{ matrix.install-method }}
        run: ./tests/e2e/install-${{ matrix.install-method }}.sh
      - name: Locate installed aelf
        id: locate
        run: |
          case "${{ matrix.install-method }}" in
            uv-tool)   bin="$HOME/.local/bin/aelf" ;;
            pipx)      bin="$(pipx environment --value PIPX_BIN_DIR)/aelf" ;;
            venv-pip)  bin="$PWD/.e2e-venv/bin/aelf" ;;
          esac
          test -x "$bin" || { echo "::error::aelf binary not found at $bin"; exit 1; }
          echo "bin=$bin" >> "$GITHUB_OUTPUT"
      - name: Run e2e suite against installed binary
        env:
          AELFRICE_E2E_BIN: ${{ steps.locate.outputs.bin }}
        run: |
          uv sync --frozen --group dev
          uv run pytest tests/e2e/ -q --maxfail=3

  surface-failure:
    needs: e2e
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - name: Label PR on failure
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "attn:e2e-failure"
      - name: Open issue on push:main failure
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          short_sha="${SHA:0:7}"
          gh issue create \
            --repo "$REPO" \
            --title "e2e: failure on main @ ${short_sha}" \
            --label "attn:e2e-failure" \
            --body "E2E job failed on push to \`main\` at commit \`${SHA}\`.

          **Failing run:** ${RUN_URL}

          This issue was opened automatically by \`.github/workflows/e2e.yml\` (#370). Triage: investigate the failing matrix leg(s), open a fix PR, then close this issue. If the failure is environmental and not a code regression, label \`attn:e2e-flake\` and quarantine within one business day per #334."
