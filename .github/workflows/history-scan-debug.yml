name: History Scan Debug (#272)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  history-scan-debug:
    if: startsWith(github.head_ref, 'ci/issue-272')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch all branches
        run: git fetch --no-tags --prune origin '+refs/heads/*:refs/remotes/origin/*'
      - name: Decode patterns
        env:
          PATTERNS: ${{ secrets.SCAN_RULES_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${PATTERNS:-}" ]; then echo "::error::SCAN_RULES_B64 not configured"; exit 1; fi
          echo "$PATTERNS" | base64 -d > /tmp/p
          [ -s /tmp/p ] || { echo "::error::empty"; exit 1; }
      - name: Diagnose history hits
        run: |
          set -euo pipefail
          git log --all --remotes='origin/*' --format='%H%n%an%n%ae%n%cn%n%ce%n%s%n%b' > /tmp/h
          git log --all --remotes='origin/*' -p > /tmp/d
          idx=0
          while IFS= read -r p; do
            idx=$((idx+1))
            [ -z "$p" ] && continue
            [[ "$p" =~ ^# ]] && continue
            head_hits=$(grep -Ec "$p" /tmp/h || true)
            diff_hits=$(grep -Ec "$p" /tmp/d || true)
            # awk: track current commit hash and current diff path; on regex hit, print "<hash> <path-or-meta>"
            ctx=$(awk -v pat="$p" '
              /^commit [0-9a-f]{40}/ { commit=substr($2,1,12); path="<commit-meta>"; next }
              /^diff --git / { path="<diff-header>"; next }
              /^\+\+\+ b\// { path=substr($0,7); next }
              /^--- a\// { next }
              { if (match($0, pat)) print commit " " path }
            ' /tmp/d | sort -u | head -10 | awk "{printf \"%s; \", \$0}")
            if [ "$head_hits" -gt 0 ] || [ "$diff_hits" -gt 0 ]; then
              echo "pattern #${idx}: head_hits=${head_hits} diff_hits=${diff_hits} ctx=[${ctx}]"
            fi
          done < /tmp/p
          rm -f /tmp/p /tmp/h /tmp/d
