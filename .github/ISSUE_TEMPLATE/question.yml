name: Question
description: Ask about behavior, design, or how to do something
title: "q: <one-line summary>"
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, please check:

        - [README](https://github.com/robotrocketscience/aelfrice#readme)
        - [QUICKSTART](https://github.com/robotrocketscience/aelfrice/blob/main/docs/QUICKSTART.md)
        - [COMMANDS](https://github.com/robotrocketscience/aelfrice/blob/main/docs/COMMANDS.md) and [MCP](https://github.com/robotrocketscience/aelfrice/blob/main/docs/MCP.md)
        - [ARCHITECTURE](https://github.com/robotrocketscience/aelfrice/blob/main/docs/ARCHITECTURE.md) and [PHILOSOPHY](https://github.com/robotrocketscience/aelfrice/blob/main/docs/PHILOSOPHY.md)
        - [LIMITATIONS](https://github.com/robotrocketscience/aelfrice/blob/main/docs/LIMITATIONS.md)
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do? What have you tried so far?
