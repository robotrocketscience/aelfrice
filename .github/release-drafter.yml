name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template: |
  ## Changes

  $CHANGES

  ## Contributors
  $CONTRIBUTORS

categories:
  - title: "Features"
    labels: ["feat", "enhancement"]
  - title: "Bug Fixes"
    labels: ["fix", "bug"]
  - title: "Performance"
    labels: ["perf"]
  - title: "Refactors"
    labels: ["refactor"]
  - title: "Documentation"
    labels: ["docs"]
  - title: "Tests"
    labels: ["test"]
  - title: "CI / Build"
    labels: ["ci", "build"]
  - title: "Dependencies"
    labels: ["dependencies"]
  - title: "Other"

# Conventional-commit prefix → bump rule
# (label-based; PR labels override this if present)
version-resolver:
  major:
    labels: ["breaking-change"]
  minor:
    labels: ["feat", "enhancement"]
  patch:
    labels: ["fix", "bug", "perf", "refactor", "docs", "ci", "build", "test", "chore", "dependencies"]
  default: patch

# Map conventional-commit prefix in PR title → label automatically
autolabeler:
  - label: "feat"
    title: ['/^feat(\(.*\))?:/i']
  - label: "fix"
    title: ['/^fix(\(.*\))?:/i']
  - label: "perf"
    title: ['/^perf(\(.*\))?:/i']
  - label: "refactor"
    title: ['/^refactor(\(.*\))?:/i']
  - label: "docs"
    title: ['/^docs(\(.*\))?:/i']
  - label: "test"
    title: ['/^test(\(.*\))?:/i']
  - label: "ci"
    title: ['/^ci(\(.*\))?:/i']
  - label: "build"
    title: ['/^build(\(.*\))?:/i']
  - label: "chore"
    title: ['/^chore(\(.*\))?:/i']
  - label: "breaking-change"
    title: ['/^[a-z]+(\(.*\))?!:/i']

exclude-labels:
  - "skip-changelog"

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'
