[project]
name = "aelfrice"
version = "0.1.0"
description = "Bayesian memory that learns from feedback"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aelfrice"]

[tool.pytest.ini_options]
testpaths = ["tests"]
